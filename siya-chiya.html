  <style>
    :root {
      --pine: #1f3a2e;
      --pine-2: #294f3c;
      --pine-deep: #132720;
      --copper: #b5651d;
      --copper-2: #d98a4a;
      --gold: #d9a441;
      --ivory: #f3ede0;
      --paper: #faf7f0;
      --slate: #33454a;
      --char: #201c18;
      --line: rgba(32, 28, 24, 0.13);
      --shadow: 0 24px 70px -30px rgba(19, 39, 32, 0.45);
      --maxw: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--ivory);
      color: var(--char);
      font-family: 'Work Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    h1,
    h2,
    h3,
    .display {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0;
      color: var(--pine-deep);
    }

    .accent-word {
      font-style: italic;
      color: var(--copper);
      font-weight: 500;
    }

    .deva {
      font-family: 'Noto Serif Devanagari', serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .wrap {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 0 28px;
    }

    button {
      font-family: inherit;
      cursor: pointer;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--copper);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 26px;
      border-radius: 3px;
      font-weight: 600;
      font-size: 0.92rem;
      border: 1.5px solid transparent;
      transition: transform .18s ease, background .18s ease, color .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .btn-primary {
      background: var(--copper);
      color: var(--ivory);
    }

    .btn-primary:hover {
      background: var(--copper-2);
      transform: translateY(-3px);
      box-shadow: 0 14px 30px -12px rgba(181, 101, 29, 0.55);
    }

    .btn-ghost {
      border-color: rgba(243, 237, 224, 0.55);
      color: var(--ivory);
    }

    .btn-ghost:hover {
      background: rgba(243, 237, 224, 0.14);
      transform: translateY(-3px);
    }

    .btn-line {
      border-color: var(--pine);
      color: var(--pine);
    }

    .btn-line:hover {
      background: var(--pine);
      color: var(--ivory);
      transform: translateY(-3px);
    }

    :focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 3px;
    }

    /* ---------- CUSTOM CURSOR ---------- */
    .cursor-dot,
    .cursor-ring {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999;
      will-change: transform;
    }

    .cursor-dot {
      width: 7px;
      height: 7px;
      margin: -3.5px 0 0 -3.5px;
      background: var(--copper);
      border-radius: 50%;
      transition: background .2s ease, opacity .2s ease;
    }

    .cursor-ring {
      width: 34px;
      height: 34px;
      margin: -17px 0 0 -17px;
      border: 1.4px solid rgba(181, 101, 29, 0.55);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: width .28s cubic-bezier(.2, .8, .2, 1), height .28s cubic-bezier(.2, .8, .2, 1), margin .28s cubic-bezier(.2, .8, .2, 1), border-color .28s ease, background .28s ease, opacity .2s ease;
    }

    .cursor-ring.hovered {
      width: 44px;
      height: 44px;
      margin: -22px 0 0 -22px;
      border-color: var(--copper);
    }

    .cursor-ring.labelled {
      width: 76px;
      height: 76px;
      margin: -38px 0 0 -38px;
      background: rgba(31, 58, 46, 0.9);
      border-color: transparent;
    }

    .cursor-ring .lbl {
      opacity: 0;
      font-size: 0.66rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--ivory);
      transition: opacity .18s ease;
    }

    .cursor-ring.labelled .lbl {
      opacity: 1;
    }

    .has-custom-cursor,
    .has-custom-cursor a,
    .has-custom-cursor button {
      cursor: none;
    }

    /* ---------- SCROLL PROGRESS ---------- */
    .progress-track {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(31, 58, 46, 0.1);
      z-index: 10000;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--copper), var(--gold));
      width: 0%;
      transition: width .08s linear;
    }

    /* ---------- REVEAL ANIMATIONS ---------- */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .8s cubic-bezier(.16, .8, .3, 1), transform .8s cubic-bezier(.16, .8, .3, 1);
    }

    .reveal.in {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-scale {
      opacity: 0;
      transform: scale(0.94);
      transition: opacity .8s ease, transform .8s ease;
    }

    .reveal-scale.in {
      opacity: 1;
      transform: scale(1);
    }

    @media (prefers-reduced-motion: reduce) {

      .reveal,
      .reveal-scale {
        opacity: 1 !important;
        transform: none !important;
        transition: none !important;
      }
    }

    /* ---------- NAV ---------- */
    header.site {
      position: sticky;
      top: 3px;
      z-index: 50;
      background: rgba(243, 237, 224, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      max-width: var(--maxw);
      margin: 0 auto;
    }

    .brand {
      display: flex;
      flex-direction: column;
      line-height: 1;
      gap: 2px;
    }

    .brand .word {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--pine-deep);
    }

    .brand .word span {
      color: var(--copper);
    }

    .brand .sub {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--slate);
    }

    nav.links {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    nav.links a {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--slate);
      position: relative;
      padding: 4px 0;
    }

    nav.links a.active,
    nav.links a:hover {
      color: var(--pine-deep);
    }

    nav.links a.active::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: -4px;
      height: 2px;
      background: var(--copper);
    }

    .cart-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1.5px solid var(--pine);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--pine-deep);
      transition: transform .2s ease;
    }

    .cart-pill.bump {
      transform: scale(1.12);
    }

    .burger {
      display: none;
      background: none;
      border: none;
      padding: 6px;
    }

    .burger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--pine-deep);
      margin: 5px 0;
    }

    .mobile-panel {
      display: none;
    }

    @media (max-width:880px) {
      nav.links {
        display: none;
      }

      .burger {
        display: block;
      }

      .mobile-panel.open {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 6px 28px 22px;
        border-top: 1px solid var(--line);
      }

      .mobile-panel a {
        padding: 12px 0;
        font-size: 1.02rem;
        font-weight: 500;
        color: var(--slate);
        border-bottom: 1px solid var(--line);
      }
    }

    /* ---------- TERRACE DIVIDER ---------- */
    .terrace {
      display: block;
      width: 100%;
      height: auto;
    }

    .terrace path.step {
      stroke-dasharray: 900;
      stroke-dashoffset: 900;
      transition: stroke-dashoffset 1.4s ease;
    }

    .terrace.in-view path.step {
      stroke-dashoffset: 0;
    }

    .terrace circle.bush {
      opacity: 0;
      transform: scale(0.4);
      transform-origin: center;
      transition: opacity .6s ease .3s, transform .6s ease .3s;
    }

    .terrace.in-view circle.bush {
      opacity: 1;
      transform: scale(1);
    }

    /* ---------- HERO ---------- */
    .hero {
      position: relative;
      min-height: 94vh;
      display: flex;
      align-items: flex-end;
      color: var(--ivory);
      overflow: hidden;
    }

    .hero-media {
      position: absolute;
      inset: -12% 0;
      z-index: 0;
    }

    .hero-media img {
      width: 100%;
      height: 124%;
      object-fit: cover;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(180deg, rgba(19, 39, 32, 0.32) 0%, rgba(19, 39, 32, 0.55) 55%, rgba(19, 39, 32, 0.94) 100%);
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      padding: 80px 28px 48px;
      max-width: var(--maxw);
      margin: 0 auto;
      width: 100%;
    }

    .hero h1 {
      color: var(--ivory);
      font-size: clamp(2.6rem, 6vw, 4.8rem);
      line-height: 1.02;
      margin: 14px 0 22px;
      max-width: 14ch;
    }

    .hero p.lead {
      font-size: clamp(1rem, 1.6vw, 1.2rem);
      max-width: 46ch;
      color: rgba(243, 237, 224, 0.88);
      margin-bottom: 32px;
    }

    .hero-ctas {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .scroll-cue {
      position: absolute;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(243, 237, 224, 0.75);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      animation: bob 2.4s ease-in-out infinite;
    }

    .scroll-cue .line {
      width: 1px;
      height: 34px;
      background: linear-gradient(180deg, rgba(243, 237, 224, 0.9), transparent);
    }

    @keyframes bob {

      0%,
      100% {
        transform: translate(-50%, 0);
      }

      50% {
        transform: translate(-50%, 8px);
      }
    }

    /* stat strip */
    .stat-strip {
      background: var(--pine-deep);
      color: var(--ivory);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .stat-grid>div {
      padding: 34px 20px;
      text-align: center;
      border-left: 1px solid rgba(243, 237, 224, 0.14);
    }

    .stat-grid>div:first-child {
      border-left: none;
    }

    .stat-num {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      color: var(--gold);
    }

    .stat-lbl {
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(243, 237, 224, 0.75);
      margin-top: 6px;
    }

    @media (max-width:760px) {
      .stat-grid {
        grid-template-columns: 1fr 1fr;
      }

      .stat-grid>div:nth-child(3) {
        border-left: none;
      }

      .stat-grid>div {
        border-bottom: 1px solid rgba(243, 237, 224, 0.14);
      }
    }

    .page-hero {
      background: var(--pine-deep);
      color: var(--ivory);
      padding: 110px 28px 70px;
      position: relative;
      overflow: hidden;
    }

    .page-hero .wrap {
      max-width: var(--maxw);
      position: relative;
      z-index: 2;
    }

    .page-hero h1 {
      color: var(--ivory);
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      margin-top: 10px;
    }

    .page-hero p {
      max-width: 55ch;
      color: rgba(243, 237, 224, 0.82);
      margin-top: 16px;
      font-size: 1.05rem;
    }

    .page-hero-art {
      position: absolute;
      inset: 0;
      opacity: 0.15;
    }

    section {
      padding: 88px 0;
    }

    section.tight {
      padding: 56px 0;
    }

    .section-head {
      max-width: 640px;
      margin-bottom: 48px;
    }

    .section-head h2 {
      font-size: clamp(1.8rem, 3.4vw, 2.5rem);
      margin-top: 10px;
    }

    .section-head p {
      margin-top: 14px;
      color: var(--slate);
      font-size: 1.02rem;
      line-height: 1.6;
    }

    .section-head.center {
      margin-left: auto;
      margin-right: auto;
      text-align: center;
    }

    .ladder {
      display: flex;
      flex-direction: column;
      border-left: 2px solid var(--line);
    }

    .rung {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 24px;
      padding: 26px 0 26px 28px;
      position: relative;
      border-bottom: 1px solid var(--line);
    }

    .rung:last-child {
      border-bottom: none;
    }

    .rung::before {
      content: '';
      position: absolute;
      left: -7px;
      top: 32px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--copper);
      border: 3px solid var(--ivory);
      box-shadow: 0 0 0 1px var(--copper);
    }

    .rung .elev {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.5rem;
      color: var(--pine);
    }

    .rung h3 {
      font-size: 1.15rem;
      margin-bottom: 6px;
    }

    .rung p {
      color: var(--slate);
      margin: 0;
      line-height: 1.55;
      font-size: 0.96rem;
    }

    .flow {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0;
    }

    .flow-step {
      padding: 22px 16px;
      border-top: 3px solid var(--pine);
      transition: transform .3s ease, border-color .3s ease;
    }

    .flow-step:hover {
      transform: translateY(-6px);
      border-color: var(--copper);
    }

    .flow-step .num {
      font-family: 'Fraunces', serif;
      color: var(--copper);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .flow-step h4 {
      font-family: 'Fraunces', serif;
      font-size: 1.05rem;
      margin: 8px 0 6px;
      color: var(--pine-deep);
    }

    .flow-step p {
      color: var(--slate);
      font-size: 0.88rem;
      line-height: 1.5;
      margin: 0;
    }

    @media (max-width:900px) {
      .flow {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width:560px) {
      .flow {
        grid-template-columns: 1fr;
      }
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    @media (max-width:900px) {
      .grid-3 {
        grid-template-columns: 1fr 1fr;
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }

      .grid-4 {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width:600px) {
      .grid-3 {
        grid-template-columns: 1fr;
      }
    }

    .photo-card {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      aspect-ratio: 4/5;
      box-shadow: var(--shadow);
    }

    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .6s cubic-bezier(.2, .8, .2, 1);
    }

    .photo-card:hover img {
      transform: scale(1.08);
    }

    .photo-card .cap {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 20px;
      background: linear-gradient(0deg, rgba(19, 39, 32, 0.85), transparent);
      color: var(--ivory);
      font-weight: 600;
    }

    .gallery-tile {
      position: relative;
      border-radius: 5px;
      overflow: hidden;
      aspect-ratio: 1/1;
    }

    .gallery-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .5s ease, filter .5s ease;
      filter: saturate(0.92);
    }

    .gallery-tile:hover img {
      transform: scale(1.1);
      filter: saturate(1.1);
    }

    .gallery-tile .tag {
      position: absolute;
      left: 10px;
      bottom: 10px;
      color: var(--ivory);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    .city-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--pine-deep);
      background: var(--paper);
      transition: transform .2s ease, background .2s ease, color .2s ease;
    }

    .city-chip:hover {
      background: var(--pine);
      color: var(--ivory);
      transform: translateY(-2px);
    }

    .band {
      position: relative;
      overflow: hidden;
      padding: 100px 0;
      color: var(--ivory);
    }

    .band-media {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .band-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .band::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      background: rgba(19, 39, 32, 0.72);
    }

    .band .wrap {
      position: relative;
      z-index: 2;
      max-width: 680px;
    }

    .band h2 {
      color: var(--ivory);
      font-size: clamp(1.8rem, 3.6vw, 2.6rem);
    }

    .band p {
      margin-top: 16px;
      color: rgba(243, 237, 224, 0.85);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    /* testimonials */
    .testi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 26px;
    }

    @media (max-width:900px) {
      .testi-grid {
        grid-template-columns: 1fr;
      }
    }

    .testi-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 30px;
      position: relative;

    /* ---------------- Images (Unsplash) ---------------- */

      terraceMed: "https://images.unsplash.com/photo-1747164628765-9394c8496a9c?w=900&q=80&auto=format&fit=crop",
      cafe: "https://images.unsplash.com/photo-1755163412328-df3b4c2b172e?w=1200&q=80&auto=format&fit=crop",
      cafeSq: "https://images.unsplash.com/photo-1755163412328-df3b4c2b172e?w=700&h=700&q=80&auto=format&fit=crop",
      himalaya: "https://images.unsplash.com/photo-1753952969735-9be9feb9a217?w=1800&q=80&auto=format&fit=crop",
      himalayaMed: "https://images.unsplash.com/photo-1753952969735-9be9feb9a217?w=1000&q=80&auto=format&fit=crop",
      pickers: "https://images.unsplash.com/photo-1743401424861-5293dbecac9e?w=1200&q=80&auto=format&fit=crop",
      pickersSq: "https://images.unsplash.com/photo-1743401424861-5293dbecac9e?w=700&h=700&q=80&auto=format&fit=crop",
      momo: "https://images.unsplash.com/photo-1534422298391-e4f8c172dddb?w=1200&q=80&auto=format&fit=crop",
      momoSq: "https://images.unsplash.com/photo-1534422298391-e4f8c172dddb?w=700&h=700&q=80&auto=format&fit=crop",
      stupa: "https://images.unsplash.com/photo-1529733905113-027ed85d7e33?w=1200&q=80&auto=format&fit=crop",

    };

    /* ---------------- SEO helper ---------------- */
    function usePageMeta(title, description) {
      useEffect(() => {
        document.title = title + " — SIYA-CHIYA";
        let meta = document.querySelector('meta[name="description"]');
        if (meta) meta.setAttribute("content", description);
        window.scrollTo(0, 0);
      }, [title, description]);
    }

    /* ---------------- Reveal on scroll ---------------- */
    function Reveal({ as: Tag = "div", className = "", delay = 0, scale = false, children, ...rest }) {
      const ref = useRef(null);
      const [inView, setInView] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) { setInView(true); obs.unobserve(el); } });
        }, { threshold: 0.18 });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return (
        <Tag ref={ref} className={(scale ? "reveal-scale " : "reveal ") + (inView ? "in " : "") + className}
          style={{ transitionDelay: `${delay}ms` }} {...rest}>
          {children}
        </Tag>
      );
    }

    function useTerraceReveal() {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) el.classList.add("in-view"); });
        }, { threshold: 0.3 });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return ref;
    }

    function TerraceDivider({ tone = "pine" }) {
      const ref = useTerraceReveal();
      const stroke = tone === "pine" ? "#1f3a2e" : "#b5651d";
      return (
        <svg ref={ref} className="terrace" viewBox="0 0 1200 90" preserveAspectRatio="none" aria-hidden="true">
          <path className="step" d="M0 80 L120 80 L160 55 L280 55 L320 30 L460 30 L500 10 L700 10 L740 30 L880 30 L920 55 L1040 55 L1080 80 L1200 80"
            fill="none" stroke={stroke} strokeWidth="2.5" />
          {[160, 320, 500, 740, 920, 1080].map((cx, i) => (
            <circle key={i} className="bush" cx={cx} cy={i % 2 === 0 ? (i < 2 ? 55 : i < 4 ? 10 : 55) : 30} r="4" fill="#d9a441" />
          ))}
        </svg>
      );
    }

    /* ---------------- Parallax hero media ---------------- */
    function ParallaxImg({ src, alt, speed = 0.3 }) {
      const ref = useRef(null);
      useEffect(() => {
        let raf;
        const onScroll = () => {
          raf = requestAnimationFrame(() => {
            if (ref.current) {
              const y = window.scrollY * speed;
              ref.current.style.transform = `translateY(${y}px)`;
            }
          });
        };
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => { window.removeEventListener("scroll", onScroll); cancelAnimationFrame(raf); };
      }, [speed]);
      return <img ref={ref} src={src} alt={alt} />;
    }

    /* ---------------- Custom cursor ---------------- */
    function CustomCursor() {
      const dotRef = useRef(null);
      const ringRef = useRef(null);
      const pos = useRef({ x: 0, y: 0, rx: 0, ry: 0 });
      const [hoverState, setHoverState] = useState({ hovered: false, label: "" });

      useEffect(() => {
        if (window.matchMedia && window.matchMedia("(pointer:coarse)").matches) return;
        document.body.classList.add("has-custom-cursor");

        const onMove = (e) => {
          pos.current.x = e.clientX; pos.current.y = e.clientY;
          if (dotRef.current) { dotRef.current.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`; }
        };
        const onOver = (e) => {
          const labelEl = e.target.closest("[data-cursor]");
          const linkEl = e.target.closest("a,button");
          if (labelEl) { setHoverState({ hovered: true, label: labelEl.getAttribute("data-cursor") }); }
          else if (linkEl) { setHoverState({ hovered: true, label: "" }); }
          else { setHoverState({ hovered: false, label: "" }); }
        };
        let raf;
        const loop = () => {
          pos.current.rx += (pos.current.x - pos.current.rx) * 0.18;
          pos.current.ry += (pos.current.y - pos.current.ry) * 0.18;
          if (ringRef.current) { ringRef.current.style.transform = `translate(${pos.current.rx}px, ${pos.current.ry}px)`; }
          raf = requestAnimationFrame(loop);
        };
        window.addEventListener("mousemove", onMove);
        document.addEventListener("mouseover", onOver);
        raf = requestAnimationFrame(loop);
        return () => {
          document.body.classList.remove("has-custom-cursor");
          window.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseover", onOver);
          cancelAnimationFrame(raf);
        };
      }, []);

      return (
        <React.Fragment>
          <div ref={dotRef} className="cursor-dot"></div>
          <div ref={ringRef} className={"cursor-ring" + (hoverState.hovered ? " hovered" : "") + (hoverState.label ? " labelled" : "")}>
            <span className="lbl">{hoverState.label}</span>
          </div>
        </React.Fragment>
      );
    }

    /* ---------------- Scroll progress bar ---------------- */
    function ScrollProgress() {
      const barRef = useRef(null);
      useEffect(() => {
        const onScroll = () => {
          const h = document.documentElement;
          const scrolled = h.scrollTop;
          const height = h.scrollHeight - h.clientHeight;
          const pct = height > 0 ? (scrolled / height) * 100 : 0;
          if (barRef.current) barRef.current.style.width = pct + "%";
        };
        window.addEventListener("scroll", onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener("scroll", onScroll);
      }, []);
      return (
        <div className="progress-track">
          <div ref={barRef} className="progress-bar"></div>
        </div>
      );
    }

    }

      const [form, setForm] = useState({ name: "", email: "", subject: "General", message: "" });
      const [sent, setSent] = useState(false);
      const [openFaq, setOpenFaq] = useState(null);

      const handle = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));
      const submit = (e) => { e.preventDefault(); setSent(true); };

      const faqs = [
        ["Do you offer wholesale pricing?", "Yes — gardens, cafés and shops ordering 5kg or more per month qualify for wholesale rates. Use the form and select Wholesale."],
        ["Can I open a SIYA-CHIYA franchise in my city?", "We're currently reviewing franchise applications for cities outside our current six. Select Franchise and tell us your city."],
        ["Is the tea available outside Nepal?", "Not yet by post — for now, every tin is sold at our tea houses or through partner shops inside Nepal."],
      ];

      return (
        <main id="main">
          <div className="page-hero">
            <div className="page-hero-art"><ParallaxImg src={IMG.terraceMed} alt="" speed={0.1} /></div>
            <div className="wrap">
              <p className="eyebrow" style={{ color: "var(--gold)" }}>We'll put the kettle on</p>
              <h1>Get in Touch</h1>
              <p>General questions, wholesale orders, or franchise interest — this reaches our Kathmandu office directly.</p>
            </div>
          </div>

          <section>
            <div className="wrap grid-2" style={{ alignItems: "flex-start" }}>
              <Reveal>
                {sent && <div className="confirm-box">Thanks — your message has been noted. We'll write back within two working days.</div>}
                <form onSubmit={submit}>
                  <div className="form-field">
                    <label htmlFor="name">Name</label>
                    <input id="name" required value={form.name} onChange={handle("name")} placeholder="Your full name" />
                  </div>
                  <div className="form-field">
                    <label htmlFor="email">Email</label>
                    <input id="email" type="email" required value={form.email} onChange={handle("email")} placeholder="you@example.com" />
                  </div>
                  <div className="form-field">
                    <label htmlFor="subject">Subject</label>
                    <select id="subject" value={form.subject} onChange={handle("subject")}>
                      <option>General</option>
                      <option>Wholesale</option>
                      <option>Franchise</option>
                      <option>Feedback</option>
                    </select>
                  </div>
                  <div className="form-field">
                    <label htmlFor="message">Message</label>
                    <textarea id="message" rows="5" required value={form.message} onChange={handle("message")} placeholder="How can we help?"></textarea>
                  </div>
                  <button type="submit" className="btn btn-primary">Send message</button>
                </form>

                <div style={{ marginTop: 48 }}>
                  <h3 style={{ marginBottom: 8 }}>Frequently asked</h3>
                  {faqs.map(([q, a], i) => (
                    <div className="accordion-item" key={i}>
                      <button className="accordion-q" onClick={() => setOpenFaq(openFaq === i ? null : i)} aria-expanded={openFaq === i}>
                        {q} <span>{openFaq === i ? "–" : "+"}</span>
                      </button>
                      {openFaq === i && <p className="accordion-a">{a}</p>}
                    </div>
                  ))}
                </div>
              </Reveal>

              <Reveal scale delay={120}>
                <div className="info-card">
                  <h3>Head Office</h3>
                  <div className="item">📍 Thamel Marg, Kathmandu 44600, Nepal</div>
                  <div className="item">☎️ +977 1-441 0000</div>
                  <div className="item">✉️ hello@siya-chiya.example.com</div>
                  <div className="item">🕐 Sunday – Friday, 9:00 AM – 5:00 PM</div>
                  <TerraceDivider tone="copper" />
                  <p style={{ fontSize: "0.85rem", color: "rgba(243,237,224,0.7)", marginTop: 12 }}>
                    For garden visits, write ahead — the Ilam house can host small groups by appointment.
                  </p>
                </div>
              </Reveal>
            </div>
          </section>
        </main>
      );
    }

    /* ================= 404 ================= */
    function NotFound() {
      usePageMeta("Page Not Found", "The page you're looking for has moved or doesn't exist on SIYA-CHIYA.");
      return (
        <main id="main">
          <div className="page-hero">
            <div className="wrap">
              <p className="eyebrow" style={{ color: "var(--gold)" }}>404</p>
              <h1>This terrace doesn't exist.</h1>
              <p>Try one of the pages in the menu, or head back <a href="#/" style={{ color: "var(--gold)", fontWeight: 600 }}>home</a>.</p>
            </div>
          </div>
        </main>
      );
    }

    /* ================= APP / ROUTER ================= */
    function App() {
      const [route, setRoute] = useState(window.location.hash || "#/");
      const [addedMap, setAddedMap] = useState({});
      const [cartCount, setCartCount] = useState(0);

      useEffect(() => {
        const onHash = () => setRoute(window.location.hash || "#/");
        window.addEventListener("hashchange", onHash);
        return () => window.removeEventListener("hashchange", onHash);
      }, []);

      const handleAdd = useCallback((name) => {
        setAddedMap(m => ({ ...m, [name]: true }));
        setCartCount(c => c + 1);
        setTimeout(() => setAddedMap(m => ({ ...m, [name]: false })), 1800);
      }, []);

      let page;
      switch (route) {
        case "#/": page = <Home />; break;
        case "#/about": page = <About />; break;
        case "#/shop": page = <Shop onAdd={handleAdd} addedMap={addedMap} />; break;
        case "#/locations": page = <Locations />; break;
        case "#/contact": page = <Contact />; break;
        default: page = <NotFound />;
      }

      return (
        <React.Fragment>
          <ScrollProgress />
          <CustomCursor />
          <NavBar route={route} cartCount={cartCount} />
          {page}
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
